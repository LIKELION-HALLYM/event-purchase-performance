name: Deploy Mypage Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "강민/mypage/**"
      - "mypage_mock_server.js"
      - ".github/workflows/deploy-mypage.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static files
        shell: bash
        run: |
          mkdir -p dist
          cp -R "강민/mypage/." dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
